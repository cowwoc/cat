# git-filter-repo standalone binary release configuration.
#
# Consumed by: plugin/scripts/download-git-filter-repo.sh
# It reads RELEASE_TAG and PLATFORM_SHA256_* to download and verify the correct
# pre-built binary for the current platform.
#
# How to update after a new release build:
#   1. Run the build-git-filter-repo CI workflow with the new version tag.
#   2. After all 4 platform builds succeed, download the .sha256 files from the
#      GitHub release artifacts (git-filter-repo-<platform>.sha256).
#   3. Update RELEASE_TAG to the new tag (e.g., git-filter-repo-v2.39.0).
#   4. Update SOURCE_SHA256 with the SHA256 of the upstream git-filter-repo.py
#      source file for that version (run: sha256sum git-filter-repo.py).
#   5. Update each PLATFORM_SHA256_* value with the hash from the corresponding
#      .sha256 file (the first field of each file, e.g.: awk '{print $1}' *.sha256).
#
# Covered files (one SHA256 per platform binary):
#   SOURCE_SHA256                  - git-filter-repo.py (upstream source, used by CI)
#   PLATFORM_SHA256_linux_x64      - git-filter-repo-linux-x64 binary
#   PLATFORM_SHA256_linux_aarch64  - git-filter-repo-linux-aarch64 binary
#   PLATFORM_SHA256_macos_x64      - git-filter-repo-macos-x64 binary
#   PLATFORM_SHA256_macos_aarch64  - git-filter-repo-macos-aarch64 binary

RELEASE_TAG="git-filter-repo-v2.38.0"
SOURCE_SHA256="69d2dae2d2331ce73b9c46d2a993046ec4bc26fd3c2328c2bcffb323b8338f8f"

PLATFORM_SHA256_linux_x64="7a96cc717ed92ec8a988f8d6a842608cb2a6a6b1b79aff27ca3d6e21b4664582"
PLATFORM_SHA256_linux_aarch64="8e52ec4727d6d3289ede26a4cf1f3638ccb057526cf48a9b1bf468373dc4ecaa"
